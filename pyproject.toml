[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
  ".venv",
  ".venv-test",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "D"]
ignore = [
  "E501",
  "D102", # Missing docstring in public method (often overridden in HA)
  "D103", # Missing docstring in public function
  "D104", # Missing docstring in public package
  "D105", # Missing docstring in magic method
  "D107", # Missing docstring in __init__
  "D202", # Missing docstring in public module
  "D203", # 1 blank line required before class docstring
  "D213", # Multi-line docstring summary should start at the second line
]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D"]
"tools/*" = ["D"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"
files = [
  "custom_components",
  "tests",
  "tools"
]
exclude = "(^mutants/|^default/|\\.venv)"
strict = true

check_untyped_defs = true
ignore_missing_imports = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.mutmut]
also_copy = ["custom_components"]
paths_to_mutate = [
  "custom_components/teltonika_rms/__init__.py",
  "custom_components/teltonika_rms/const.py",
  "custom_components/teltonika_rms/api.py",
  "custom_components/teltonika_rms/models.py",
  "custom_components/teltonika_rms/status_channel.py",
]
