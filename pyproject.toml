[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
  ".venv",
  ".venv-test",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"
files = [
  "custom_components/teltonika_rms/__init__.py",
  "custom_components/teltonika_rms/api.py",
  "custom_components/teltonika_rms/application_credentials.py",
  "custom_components/teltonika_rms/binary_sensor.py",
  "custom_components/teltonika_rms/button.py",
  "custom_components/teltonika_rms/config_flow.py",
  "custom_components/teltonika_rms/const.py",
  "custom_components/teltonika_rms/coordinator.py",
  "custom_components/teltonika_rms/device_tracker.py",
  "custom_components/teltonika_rms/diagnostics.py",
  "custom_components/teltonika_rms/endpoint_matrix.py",
  "custom_components/teltonika_rms/entity.py",
  "custom_components/teltonika_rms/exceptions.py",
  "custom_components/teltonika_rms/models.py",
  "custom_components/teltonika_rms/sensor.py",
  "custom_components/teltonika_rms/status_channel.py",
  "custom_components/teltonika_rms/switch.py",
  "custom_components/teltonika_rms/update.py",
]
exclude = "(^tests/|^tools/|^mutants/|^default/)"
check_untyped_defs = true
ignore_missing_imports = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.mutmut]
debug = true
paths_to_mutate = [
  "custom_components/teltonika_rms/__init__.py",
  "custom_components/teltonika_rms/const.py",
  "custom_components/teltonika_rms/api.py",
  "custom_components/teltonika_rms/models.py",
  "custom_components/teltonika_rms/status_channel.py",
]
