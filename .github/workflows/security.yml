name: Security Gates

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "11 4 * * 2"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/github/pyenv
      PATH: /opt/github/pyenv/shims:/opt/github/pyenv/bin:${PATH}
      PYENV_VERSION: "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements-dev.txt
          ignore-vulns: |
            CVE-2025-67221
            CVE-2026-32597
            CVE-2026-27448
            CVE-2026-27459
            CVE-2026-4539

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
