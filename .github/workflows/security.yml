name: Security Gates

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "11 4 * * 2"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: [self-hosted, linux, X64]
    permissions:
      contents: read
      actions: read
    env:
      PYENV_ROOT: /opt/github/pyenv
      PATH: /opt/github/pyenv/shims:/opt/github/pyenv/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install dependencies for audit
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --index-url https://artifacts.home.siczb.de/repository/pypi-proxy/simple/ -r requirements-dev.txt

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: .venv
          inputs: requirements-dev.txt
          pip-index-url: https://artifacts.home.siczb.de/repository/pypi-proxy/simple/
          ignore-vulns: |
            CVE-2025-67221
            CVE-2026-32597
            CVE-2026-27448
            CVE-2026-27459
            CVE-2026-4539
            CVE-2026-25645
            CVE-2026-34073
            CVE-2026-39892
            GHSA-pjjw-68hj-v9mw
            CVE-2026-34513
            CVE-2026-34525
            CVE-2026-34519
            CVE-2026-34520
            CVE-2026-34517

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
