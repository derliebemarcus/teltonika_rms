name: Security Gates

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  schedule:
    - cron: "11 4 * * 2"

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: [self-hosted, linux, X64]
    permissions:
      contents: read
    env:
      PYENV_ROOT: /opt/github/pyenv
      PATH: /opt/github/pyenv/shims:/opt/github/pyenv/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
      PIP_INDEX_URL: https://artifacts.home.siczb.de/repository/pypi-proxy/simple/
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install dependencies for audit
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -r requirements.txt

      - name: Audit Python dependencies
        run: |
          source .venv/bin/activate
          python tools/run_pip_audit.py -r requirements.txt

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
