name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to repair or republish, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write
  actions: read
  statuses: read

concurrency:
  group: publish-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="$GITHUB_REF_NAME"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out tagged revision
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate, wait for checks, and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: node .github/scripts/publish-release.mjs "${{ steps.tag.outputs.tag }}"
