name: Dispatch release v0.9.11-beta.3

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/dispatch-release-v0.9.11-beta.3.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            repos/${{ github.repository }}/actions/workflows/release.yml/dispatches \
            -f ref=main \
            -f 'inputs[tag]=v0.9.11-beta.3'
