name: Quality Gates

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-rules:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/github/pyenv
      PATH: /opt/github/pyenv/shims:/opt/github/pyenv/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine commit range
        id: range
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "range=HEAD^..HEAD" >> "$GITHUB_OUTPUT"
          else
            if git rev-parse --quiet --verify "${{ github.event.before }}^{commit}" > /dev/null; then
              echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
            else
              echo "range=HEAD^..HEAD" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Validate commit messages
        run: python tools/check_commit_messages.py "${{ steps.range.outputs.range }}"

      - name: Validate release notes
        run: python tools/check_release_notes.py custom_components/teltonika_rms/manifest.json CHANGELOG.md

  static-analysis:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/github/pyenv
      PATH: /opt/github/pyenv/shims:/opt/github/pyenv/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install static-analysis dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip --index-url https://artifacts.home.siczb.de/repository/pypi-proxy/simple/
          python -m pip install --index-url https://artifacts.home.siczb.de/repository/pypi-proxy/simple/ -r requirements-dev.txt

      - name: Run Ruff lint
        run: |
          source .venv/bin/activate
          python -m ruff check .

      - name: Run Ruff format check
        run: |
          source .venv/bin/activate
          python -m ruff format --check .

      - name: Run mypy
        run: |
          source .venv/bin/activate
          python -m mypy .

      - name: Check translation consistency
        run: |
          source .venv/bin/activate
          python tools/check_translations.py

  sonarqube:
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarqube.home.siczb.de
        with:
          args: >
            -Dsonar.projectKey=teltonika_rms
            -Dsonar.python.version=3.14
            -Dsonar.sources=custom_components/teltonika_rms
            -Dsonar.tests=tests

  workflow-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: devops-actions/actionlint@v0.1.11
