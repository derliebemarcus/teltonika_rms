name: Finalize dependency lockfile

on:
  push:
    branches:
      - fix-osv-homeassistant-2026-6
    paths:
      - .github/workflows/regenerate-lockfile.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: macos-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: fix-osv-homeassistant-2026-6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Verify and remove temporary workflow
        run: |
          python -m pip install 'pip-tools==7.5.3'
          python -m piptools compile --no-header requirements-dev.txt -o requirements.txt.check
          diff requirements.txt requirements.txt.check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/regenerate-lockfile.yml
          git commit -m 'ci: remove temporary dependency workflow'
          git push origin HEAD:fix-osv-homeassistant-2026-6
