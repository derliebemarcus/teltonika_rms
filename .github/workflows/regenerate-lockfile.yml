name: Regenerate dependency lockfile

on:
  push:
    branches:
      - fix-osv-homeassistant-2026-6
    paths:
      - requirements-dev.txt
      - .github/workflows/regenerate-lockfile.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: macos-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: fix-osv-homeassistant-2026-6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install pip-tools
        run: python -m pip install 'pip-tools==7.5.3'

      - name: Compile lockfile
        run: python -m piptools compile --no-header requirements-dev.txt -o requirements.txt

      - name: Commit lockfile
        run: |
          if git diff --quiet -- requirements.txt; then
            echo 'Lockfile already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add requirements.txt
          git commit -m 'fix: refresh dependency lockfile for Home Assistant 2026.6.4'
          git push origin HEAD:fix-osv-homeassistant-2026-6
