name: Prepare HACS release changelog

on:
  push:
    branches:
      - hacs-default-submission

permissions:
  contents: write

jobs:
  update-changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out submission branch
        uses: actions/checkout@v7
        with:
          ref: hacs-default-submission
      - name: Prepend release notes and remove temporary workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          marker = '## 0.9.11-beta.4 - 2026-06-24'
          if marker not in text:
              intro = '# Changelog\n\nAll notable changes to this project are documented in this file.\n\n'
              section = '''## 0.9.11-beta.4 - 2026-06-24

### New Features

- None.

### Improvements

- Prepared the repository metadata for submission to the default HACS store.
- Removed the incorrect Switzerland-only HACS availability restriction.

### Changes

- Updated the manifest documentation, issue tracker, and code owner for the renamed repository.

### Bugfixes

- None.

'''
              if not text.startswith(intro):
                  raise SystemExit('Unexpected CHANGELOG.md header')
              changelog.write_text(intro + section + text[len(intro):], encoding='utf-8')
          Path('.github/workflows/prepare-hacs-changelog.yml').unlink()
          PY
      - name: Commit prepared changelog
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md .github/workflows/prepare-hacs-changelog.yml
          git commit -m 'docs: add v0.9.11-beta.4 release notes'
          git push origin HEAD:hacs-default-submission
