name: Prepare HACS release changelog

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: hacs-default-submission
      - name: Add stable release notes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('CHANGELOG.md')
          text = path.read_text(encoding='utf-8')
          intro = '# Changelog\n\nAll notable changes to this project are documented in this file.\n\n'
          section = (
              "## 0.9.11 - 2026-06-24\n\n"
              "### New Features\n\n"
              "- None.\n\n"
              "### Improvements\n\n"
              "- Prepared the repository metadata for submission to the default HACS store.\n"
              "- Removed the incorrect Switzerland-only HACS availability restriction.\n\n"
              "### Changes\n\n"
              "- Updated the manifest documentation, issue tracker, and code owner for the renamed repository.\n\n"
              "### Bugfixes\n\n"
              "- None.\n\n"
          )
          if '## 0.9.11 - 2026-06-24' not in text:
              path.write_text(intro + section + text[len(intro):], encoding='utf-8')
          Path('.github/workflows/prepare-hacs-changelog.yml').unlink()
          PY
      - name: Commit release notes
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add CHANGELOG.md .github/workflows/prepare-hacs-changelog.yml
          git commit -m 'docs: add v0.9.11 release notes'
          git push origin HEAD:hacs-default-submission
