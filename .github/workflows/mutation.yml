name: Mutation Testing

on:
  workflow_dispatch:
  schedule:
    - cron: "29 2 * * 6"

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/github/pyenv
      PATH: /opt/github/pyenv/shims:/opt/github/pyenv/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install mutation test dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run mutation testing
        run: |
          source .venv/bin/activate
          python -m pytest --cov=custom_components/teltonika_rms --cov-context=test --cov-config=.coveragerc tests/
          mutmut run

      - name: Upload mutmut results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutmut-results
          path: .mutmut-cache
          if-no-files-found: ignore
