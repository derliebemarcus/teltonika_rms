name: Publish v0.9.11-beta.3

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.9.11-beta.3.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: v0.9.11-beta.3

      - name: Extract release notes
        run: python3 tools/extract_release_notes.py custom_components/teltonika_rms/manifest.json CHANGELOG.md release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view v0.9.11-beta.3 >/dev/null 2>&1; then
            gh release edit v0.9.11-beta.3 \
              --title 'Release v0.9.11-beta.3' \
              --notes-file release_notes.md \
              --prerelease
          else
            gh release create v0.9.11-beta.3 \
              --verify-tag \
              --title 'Release v0.9.11-beta.3' \
              --notes-file release_notes.md \
              --prerelease
          fi
