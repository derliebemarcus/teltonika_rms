name: Lockfile Consistency

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  check-lockfile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install pip-tools
        run: pip install pip-tools
      - name: Check if requirements.txt is up to date
        run: |
          cp requirements.txt requirements.txt.check

          pip-compile \
            --no-strip-extras \
            --no-header \
            requirements-dev.txt \
            -o requirements.txt.check

          if ! diff requirements.txt requirements.txt.check; then
            echo "requirements.txt is out of sync with requirements-dev.txt"
            echo "Please run 'make lock' locally and commit the changes."
            exit 1
          fi
