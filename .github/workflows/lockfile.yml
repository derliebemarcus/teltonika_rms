name: Lockfile Consistency

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install pip-tools
        run: pip install pip-tools
      - name: Check if requirements.txt is up to date
        run: |
          pip-compile requirements-dev.txt -o requirements.txt.check
          if ! diff requirements.txt requirements.txt.check; then
            echo "requirements.txt is out of sync with requirements-dev.txt"
            echo "Please run 'make lock' locally and commit the changes."
            exit 1
          fi
