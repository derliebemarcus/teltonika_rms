name: Lockfile Consistency

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install pip-tools
        run: pip install pip-tools==7.5.3
      - name: Check if requirements.txt is up to date
        run: tools/compile_lockfile.sh --check
