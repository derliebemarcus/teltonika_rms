name: Regenerate Home Assistant lockfile

on:
  push:
    branches:
      - maintenance/116-complete-ci-cd-migration

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Generate canonical dependency lockfile
        run: |
          python -m pip install pip-tools==7.5.3
          python -m piptools compile --no-strip-extras requirements-dev.in -o requirements.txt

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: home-assistant-2026-7-lockfile
          path: requirements.txt
